<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DevilGPT — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(255, 0, 0, 0.15), transparent 70%),
                        radial-gradient(circle at 80% 70%, rgba(0, 0, 0, 0.9), transparent 70%);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: rgba(10, 10, 18, 0.85);
            backdrop-filter: blur(25px);
            border-radius: 48px;
            border: 1px solid rgba(255, 0, 0, 0.4);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 0, 0, 0.2), 0 0 30px rgba(255, 0, 0, 0.2);
            padding: 40px 32px;
            text-align: center;
        }

        .login-card h1 {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff0000, #660000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .login-card p {
            color: #888;
            font-size: 13px;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #ccc;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 28px;
            color: white;
            font-size: 15px;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #ff0000;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(95deg, #ff0000, #660000);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
        }

        .login-btn:active {
            transform: scale(0.97);
        }

        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            background: #1a1a2e;
            border-left: 4px solid #ff0000;
            padding: 14px 20px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            z-index: 2000;
            transform: translateX(120%);
            transition: transform 0.4s ease-out;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast i {
            margin-right: 8px;
            color: #ff0000;
        }
    </style>
</head>
<body>

<div id="toast" class="toast">
    <i class="fas fa-exclamation-triangle"></i> Incorrect username or password
</div>

<div class="login-container">
    <div class="login-card">
        <h1>DEVILGPT</h1>
        <p>Login to continue</p>
        
        <div class="input-group">
            <label>USERNAME</label>
            <input type="text" id="loginUsername" placeholder="Enter username">
        </div>
        <div class="input-group">
            <label>PASSWORD</label>
            <input type="password" id="loginPassword" placeholder="Enter password">
        </div>
        
        <button class="login-btn" onclick="handleLogin()">⟡ ENTER ⟡</button>
    </div>
</div>

<script>
    // ========== AKUN DEFAULT (GAMPANG TAMBAHIN) ==========
    const ACCOUNTS = [
        { username: "admin", password: "admin123" },
        { username: "zetsu", password: "zetsu123" },
        { username: "root", password: "root123" },
        { username: "devil", password: "devil123" }
    ];

    function showToast() {
        const toast = document.getElementById('toast');
        toast.classList.remove('show');
        void toast.offsetWidth;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }

    function handleLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();

        const found = ACCOUNTS.find(acc => acc.username === username && acc.password === password);

        if (found) {
            localStorage.setItem('devil_user', username);
            window.location.href = 'devil.html';
        } else {
            showToast();
        }
    }
</script>
</body>
</html>
